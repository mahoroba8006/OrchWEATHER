<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#51c49f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ── SEO ── -->
    <title>農業のための天気アプリ Orch.Weather｜積算温度・農作業を1画面で</title>
    <meta name="description" content="農家が現場で作った気象データ活用ツール。天気を午前・午後・夜間に分け、雨は「カッパが要るか」まで表示。積算温度の自動計算、去年や他地点とのグラフ比較、過去の天気の振り返りで、農作業の判断を1画面に。" />
    <link rel="canonical" href="https://weather.orch-app.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Orch.Weather" />
    <meta property="og:title" content="農業のための天気アプリ Orch.Weather" />
    <meta property="og:description" content="天気を午前・午後・夜間に分け、雨は「カッパが要るか」まで。積算温度の自動計算や去年・他地点との比較も。農家が現場で欲しかった機能を1画面に。" />
    <meta property="og:url" content="https://weather.orch-app.com/" />
    <meta property="og:image" content="https://weather.orch-app.com/og-image.png" />
    <meta property="og:image:width" content="960" />
    <meta property="og:image:height" content="579" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="農業のための天気アプリ Orch.Weather" />
    <meta name="twitter:description" content="天気を午前・午後・夜間に分け、雨は「カッパが要るか」まで。積算温度の自動計算や去年・他地点との比較も。農家が現場で欲しかった機能を1画面に。" />
    <meta name="twitter:image" content="https://weather.orch-app.com/og-image.png" />

    <!-- 構造化データ（WebApplication） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Orch.Weather",
      "url": "https://weather.orch-app.com/",
      "description": "農家が現場で作った気象データ活用ツール。天気を午前・午後・夜間に分け、雨は「カッパが要るか」まで表示。積算温度の自動計算、去年や他地点とのグラフ比較、過去の天気の振り返りで、農作業の判断を1画面に。",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "inLanguage": "ja",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      }
    }
    </script>
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.firstChild) {
          root.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;';
          root.innerHTML = '<div style="text-align:center;font-family:sans-serif;color:#475569;max-width:400px"><img src="/icon.png" style="width:48px;height:48px;margin-bottom:16px"><br><b style="color:#e11d48">起動エラーが発生しました</b><br><small style="display:block;margin-top:8px;word-break:break-all;color:#94a3b8">' + (e.message || String(e)) + '</small></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && !root.firstChild) {
          root.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;';
          root.innerHTML = '<div style="text-align:center;font-family:sans-serif;color:#475569;max-width:400px"><img src="/icon.png" style="width:48px;height:48px;margin-bottom:16px"><br><b style="color:#e11d48">起動エラーが発生しました</b><br><small style="display:block;margin-top:8px;word-break:break-all;color:#94a3b8">' + String(e.reason) + '</small></div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
