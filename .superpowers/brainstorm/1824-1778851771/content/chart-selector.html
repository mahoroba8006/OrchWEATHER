<style>
  .demo-frame {
    max-width: 390px;
    margin: 0 auto;
    background: #1a1220;
    border-radius: 16px;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .demo-header {
    background: rgba(255,255,255,0.05);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(244,167,185,0.15);
    font-size: 13px;
    color: #f4a7b9;
    font-weight: 600;
  }
  .demo-range-row {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #94a3b8;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .demo-select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(244,167,185,0.3);
    color: #e2e8f0;
    border-radius: 5px;
    padding: 3px 6px;
    font-size: 11px;
  }
  .demo-chart-placeholder {
    height: 180px;
    background: rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #475569;
    font-size: 12px;
    margin: 12px;
    border-radius: 10px;
    border: 1px dashed rgba(255,255,255,0.08);
  }

  /* === A: 横スクロールタブ === */
  .tabs-scroll {
    display: flex;
    gap: 6px;
    padding: 8px 14px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tab-pill {
    flex-shrink: 0;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid rgba(244,167,185,0.3);
    color: #94a3b8;
    background: transparent;
  }
  .tab-pill.active {
    background: #f4a7b9;
    color: #7a2840;
    font-weight: 600;
    border-color: #f4a7b9;
  }

  /* === B: 2行グリッド === */
  .tabs-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .tab-grid-btn {
    padding: 6px 4px;
    border-radius: 7px;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    border: 1px solid rgba(244,167,185,0.25);
    color: #94a3b8;
    background: transparent;
  }
  .tab-grid-btn.active {
    background: rgba(244,167,185,0.2);
    color: #f4a7b9;
    font-weight: 600;
    border-color: rgba(244,167,185,0.6);
  }

  .split { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .option-wrap { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .option-label { font-size: 13px; color: #94a3b8; }
</style>

<h2>チャート選択UIのレイアウト</h2>
<p class="subtitle">モバイル（390px）での見え方。どちらのボタン配置が使いやすいですか？</p>

<div class="split">

  <!-- Option A -->
  <div class="option-wrap">
    <div class="option" data-choice="a" onclick="toggleSelect(this)" style="padding:0;border-radius:16px;overflow:hidden;width:280px;">
      <div class="demo-frame">
        <div class="demo-header">🌿 OrchWEATHER</div>
        <div class="demo-range-row">
          表示期間
          <select class="demo-select"><option>1月</option></select>〜
          <select class="demo-select"><option>12月</option></select>
          <span style="margin-left:auto;background:rgba(244,167,185,0.15);border:1px solid rgba(244,167,185,0.4);color:#f4a7b9;border-radius:5px;padding:3px 7px;font-size:11px;">年間表示</span>
        </div>
        <div class="tabs-scroll">
          <div class="tab-pill active">気温</div>
          <div class="tab-pill">降水量</div>
          <div class="tab-pill">日照時間</div>
          <div class="tab-pill">日射量</div>
          <div class="tab-pill">積算温度</div>
          <div class="tab-pill">湿度</div>
        </div>
        <div class="demo-chart-placeholder">📈 気温グラフ</div>
      </div>
      <div class="letter" style="position:static;margin-top:8px;">A</div>
      <div class="content" style="text-align:center;">
        <h3>横スクロールタブ</h3>
        <p>1行・左右にスクロール可。見切れても直感的</p>
      </div>
    </div>
  </div>

  <!-- Option B -->
  <div class="option-wrap">
    <div class="option" data-choice="b" onclick="toggleSelect(this)" style="padding:0;border-radius:16px;overflow:hidden;width:280px;">
      <div class="demo-frame">
        <div class="demo-header">🌿 OrchWEATHER</div>
        <div class="demo-range-row">
          表示期間
          <select class="demo-select"><option>1月</option></select>〜
          <select class="demo-select"><option>12月</option></select>
          <span style="margin-left:auto;background:rgba(244,167,185,0.15);border:1px solid rgba(244,167,185,0.4);color:#f4a7b9;border-radius:5px;padding:3px 7px;font-size:11px;">年間表示</span>
        </div>
        <div class="tabs-grid">
          <div class="tab-grid-btn active">気温</div>
          <div class="tab-grid-btn">降水量</div>
          <div class="tab-grid-btn">日照時間</div>
          <div class="tab-grid-btn">日射量</div>
          <div class="tab-grid-btn">積算温度</div>
          <div class="tab-grid-btn">湿度</div>
        </div>
        <div class="demo-chart-placeholder">📈 気温グラフ</div>
      </div>
      <div class="letter" style="position:static;margin-top:8px;">B</div>
      <div class="content" style="text-align:center;">
        <h3>2行グリッド（3×2）</h3>
        <p>全項目が常時見える。スクロール不要</p>
      </div>
    </div>
  </div>

</div>
